name: Compilar APK con Buildozer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Cache para Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
          ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}

    - name: Compilar APK con Buildozer Action
      uses: RafaelBlanco/action-kivy-apk@v1.1.0
      id: buildozer
      with:
        command: buildozer android debug
        repository_root: .

    - name: Subir APK generado como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: QuizGen-IA-APK
        path: ${{ steps.buildozer.outputs.filename }}

    - name: Subir APK generado como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: QuizGen-IA-APK
        path: ${{ steps.buildozer.outputs.filename }}
